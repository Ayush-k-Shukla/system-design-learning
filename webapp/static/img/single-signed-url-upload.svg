<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 360" width="100%" height="100%">
  <!-- Background -->
  <rect width="850" height="360" fill="#1e1e24" rx="8" />

  <!-- Entity Boxes -->
  <!-- Client UI -->
  <rect x="40" y="130" width="160" height="90" rx="6" fill="#2d3748" stroke="#63b3ed" stroke-width="2"/>
  <text x="120" y="170" fill="#e2e8f0" font-family="Segoe UI, sans-serif" font-size="15" font-weight="bold" text-anchor="middle">Frontend UI</text>
  <text x="120" y="195" fill="#a0aec0" font-family="Segoe UI, sans-serif" font-size="12" text-anchor="middle">(Browser / App)</text>

  <!-- App Backend -->
  <rect x="340" y="40" width="180" height="90" rx="6" fill="#2d3748" stroke="#48bb78" stroke-width="2"/>
  <text x="430" y="80" fill="#e2e8f0" font-family="Segoe UI, sans-serif" font-size="15" font-weight="bold" text-anchor="middle">App Backend</text>
  <text x="430" y="105" fill="#a0aec0" font-family="Segoe UI, sans-serif" font-size="12" text-anchor="middle">(Node.js / Java Server)</text>

  <!-- Cloud Storage -->
  <rect x="640" y="130" width="170" height="90" rx="6" fill="#2d3748" stroke="#ed8936" stroke-width="2"/>
  <text x="725" y="170" fill="#e2e8f0" font-family="Segoe UI, sans-serif" font-size="15" font-weight="bold" text-anchor="middle">Cloud Storage</text>
  <text x="725" y="195" fill="#a0aec0" font-family="Segoe UI, sans-serif" font-size="12" text-anchor="middle">(S3 / GCS Bucket)</text>

  <!-- Flow Lines & Arrows -->
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#a0aec0" />
    </marker>
    <marker id="green-arrow" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#48bb78" />
    </marker>
    <marker id="orange-arrow" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#ed8936" />
    </marker>
  </defs>

  <!-- Step 1: Request URL -->
  <path d="M 140 130 L 140 75 L 340 75" fill="none" stroke="#a0aec0" stroke-width="2" stroke-dasharray="4" marker-end="url(#arrow)" />
  <text x="210" y="65" fill="#cbd5e0" font-family="Segoe UI, sans-serif" font-size="11" font-weight="bold">1. Request Upload URL</text>

  <!-- Step 2: Local Cryptographic Math (Inside Backend Box visual note) -->
  <circle cx="430" cy="113" r="3" fill="#48bb78"/>

  <!-- Step 3: Return Presigned URL Token -->
  <path d="M 340 105 L 180 105 L 180 130" fill="none" stroke="#48bb78" stroke-width="2" marker-end="url(#green-arrow)" />
  <text x="210" y="122" fill="#48bb78" font-family="Segoe UI, sans-serif" font-size="11" font-weight="bold">2. Returns Presigned URL</text>

  <!-- Step 4: Binary Data Stream directly to S3 -->
  <path d="M 200 185 L 630 185" fill="none" stroke="#ed8936" stroke-width="3" marker-end="url(#orange-arrow)" />
  <text x="415" y="175" fill="#ed8936" font-family="Segoe UI, sans-serif" font-size="12" font-weight="bold" text-anchor="middle">3. Heavy Upload Stream (PUT/POST)</text>

  <!-- Step 5: Webhook / Async Notification -->
  <path d="M 690 130 L 690 75 L 520 75" fill="none" stroke="#a0aec0" stroke-width="1.5" stroke-dasharray="3" marker-end="url(#arrow)" />
  <text x="610" y="65" fill="#cbd5e0" font-family="Segoe UI, sans-serif" font-size="11" text-anchor="middle">4. Event Trigger (Optional)</text>
</svg>
