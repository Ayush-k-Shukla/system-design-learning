<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <defs>
    <style>
      .bg { fill: #0f172a; }
      .layer-bg { fill: #1e293b; stroke: #475569; stroke-width: 1; opacity: 0.4; }
      .graph-edge { stroke: #64748b; stroke-width: 1.5; opacity: 0.4; }
      .routing-edge { stroke: #10b981; stroke-width: 3; stroke-dasharray: 4 2; }
      .drop-edge { stroke: #f59e0b; stroke-width: 2.5; stroke-dasharray: 3 3; }
      .node { fill: #475569; stroke: #334155; stroke-width: 1.5; }
      .node-active { fill: #10b981; stroke: #047857; stroke-width: 2; }
      .node-drop { fill: #f59e0b; stroke: #b45309; stroke-width: 2; }
      .query-node { fill: #f43f5e; stroke: #be123c; stroke-width: 2; }
      .text-title { font-family: system-ui, sans-serif; font-weight: bold; font-size: 16px; fill: #f8fafc; }
      .text-layer { font-family: system-ui, sans-serif; font-weight: bold; font-size: 13px; fill: #94a3b8; }
      .text-label { font-family: system-ui, sans-serif; font-size: 12px; fill: #cbd5e1; }
    </style>
  </defs>

  <!-- Background -->
  <rect class="bg" width="800" height="500" rx="8" />

  <text x="30" y="40" class="text-title">HNSW Graph Architecture &amp; Search Routing</text>
  <text x="30" y="60" class="text-layer" font-weight="normal">Multi-layer Skip Graph Traversal Path</text>

  <!-- ================= LAYER 2 (TOP) ================= -->
  <g transform="translate(0, -30)">
    <polygon points="100,160 550,130 700,190 250,220" class="layer-bg" />
    <text x="120" y="185" class="text-layer">Layer 2 (Express Shortcuts)</text>

    <!-- Edges -->
    <line x1="200" y1="170" x2="580" y2="160" class="graph-edge routing-edge" />

    <!-- Nodes -->
    <circle cx="200" cy="170" r="6" class="node-active" /> <!-- Entry Point -->
    <text x="180" y="155" class="text-label" fill="#10b981">Entry Point</text>

    <circle cx="580" cy="160" r="6" class="node-drop" /> <!-- Local Minima Layer 2 -->
    <text x="590" y="155" class="text-label" fill="#f59e0b">Local Min</text>
  </g>

  <!-- Drop Link Layer 2 to Layer 1 -->
  <line x1="580" y1="130" x2="580" y2="250" class="drop-edge" />

  <!-- ================= LAYER 1 (MIDDLE) ================= -->
  <g transform="translate(0, 90)">
    <polygon points="100,160 550,130 700,190 250,220" class="layer-bg" />
    <text x="120" y="185" class="text-layer">Layer 1 (Medium Range Links)</text>

    <!-- Edges -->
    <line x1="220" y1="180" x2="400" y2="150" class="graph-edge" />
    <line x1="400" y1="150" x2="580" y2="160" class="graph-edge" />
    <line x1="580" y1="160" x2="640" y2="175" class="graph-edge routing-edge" />

    <!-- Nodes -->
    <circle cx="220" cy="180" r="5" class="node" />
    <circle cx="400" cy="150" r="5" class="node" />
    <circle cx="580" cy="160" r="5" class="node-active" /> <!-- Match from top -->
    <circle cx="640" cy="175" r="5" class="node-drop" /> <!-- Local Minima Layer 1 -->
  </g>

  <!-- Drop Link Layer 1 to Layer 0 -->
  <line x1="640" y1="265" x2="640" y2="385" class="drop-edge" />

  <!-- ================= LAYER 0 (BOTTOM) ================= -->
  <g transform="translate(0, 210)">
    <polygon points="100,160 550,130 700,190 250,220" class="layer-bg" />
    <text x="120" y="185" class="text-layer">Layer 0 (Dense Base Data - All Vectors)</text>

    <!-- Edges Base Mesh -->
    <line x1="150" y1="170" x2="250" y2="150" class="graph-edge" />
    <line x1="250" y1="150" x2="380" y2="180" class="graph-edge" />
    <line x1="380" y1="180" x2="500" y2="140" class="graph-edge" />
    <line x1="500" y1="140" x2="640" y2="175" class="graph-edge" />
    <line x1="640" y1="175" x2="610" y2="195" class="graph-edge routing-edge" />
    <line x1="610" y1="195" x2="570" y2="185" class="graph-edge routing-edge" />

    <!-- Secondary cluster edges -->
    <line x1="570" y1="185" x2="530" y2="200" class="graph-edge" />
    <line x1="640" y1="175" x2="680" y2="160" class="graph-edge" />

    <!-- Nodes -->
    <circle cx="150" cy="170" r="4" class="node" />
    <circle cx="250" cy="150" r="4" class="node" />
    <circle cx="380" cy="180" r="4" class="node" />
    <circle cx="500" cy="140" r="4" class="node" />
    <circle cx="530" cy="200" r="4" class="node" />
    <circle cx="680" cy="160" r="4" class="node" />

    <circle cx="640" cy="175" r="4" class="node-active" /> <!-- Landed from Layer 1 -->
    <circle cx="610" cy="195" r="4" class="node-active" />
    <circle cx="570" cy="185" r="5" fill="#10b981" stroke="#f43f5e" stroke-width="1.5" /> <!-- Nearest Neighbor Result -->

    <!-- Query Target Vector Flag -->
    <circle cx="560" cy="180" r="3" class="query-node" />
    <path d="M 560 180 L 540 140 L 580 140 Z" fill="#f43f5e" opacity="0.8"/>
    <text x="530" y="130" class="text-label" fill="#f43f5e" font-weight="bold">Query Target</text>
  </g>

  <!-- Legend Elements -->
  <g transform="translate(30, 420)">
    <circle cx="10" cy="10" r="5" class="node-active" />
    <text x="25" y="14" class="text-label">Fast Routing Path</text>

    <circle cx="160" cy="10" r="5" class="node-drop" />
    <text x="175" y="14" class="text-label">Drop Layer Gate</text>

    <line x1="300" y1="10" x2="330" y2="10" class="drop-edge" />
    <text x="345" y="14" class="text-label">Layer Transition (Down)</text>
  </g>
</svg>
