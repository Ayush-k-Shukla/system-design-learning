<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 420" width="100%" height="100%">
  <!-- Background -->
  <rect width="850" height="420" fill="#1e1e24" rx="8" />

  <!-- Component Elements -->
  <!-- Client Browser with File Slices -->
  <rect x="30" y="130" width="190" height="180" rx="6" fill="#2d3748" stroke="#63b3ed" stroke-width="2"/>
  <text x="125" y="155" fill="#e2e8f0" font-family="Segoe UI, sans-serif" font-size="14" font-weight="bold" text-anchor="middle">Client Browser</text>
  
  <!-- File Slices in UI -->
  <rect x="45" y="180" width="45" height="30" rx="3" fill="#4a5568" stroke="#63b3ed" stroke-width="1"/>
  <text x="67.5" y="198" fill="#cbd5e0" font-family="Segoe UI, sans-serif" font-size="10" text-anchor="middle">Part 1</text>

  <rect x="100" y="180" width="45" height="30" rx="3" fill="#4a5568" stroke="#63b3ed" stroke-width="1"/>
  <text x="122.5" y="198" fill="#cbd5e0" font-family="Segoe UI, sans-serif" font-size="10" text-anchor="middle">Part 2</text>

  <rect x="155" y="180" width="45" height="30" rx="3" fill="#4a5568" stroke="#3182ce" stroke-width="1" stroke-dasharray="2"/>
  <text x="177.5" y="198" fill="#718096" font-family="Segoe UI, sans-serif" font-size="10" text-anchor="middle">Part N</text>
  
  <text x="125" y="240" fill="#a0aec0" font-family="Segoe UI, sans-serif" font-size="11" text-anchor="middle" font-style="italic">File Slicing: file.slice()</text>
  <text x="125" y="255" fill="#a0aec0" font-family="Segoe UI, sans-serif" font-size="10" text-anchor="middle">No RAM bloat / Pure stream</text>

  <!-- System Backend Coordinator -->
  <rect x="350" y="30" width="180" height="85" rx="6" fill="#2d3748" stroke="#48bb78" stroke-width="2"/>
  <text x="440" y="65" fill="#e2e8f0" font-family="Segoe UI, sans-serif" font-size="14" font-weight="bold" text-anchor="middle">Backend Server</text>
  <text x="440" y="85" fill="#a0aec0" font-family="Segoe UI, sans-serif" font-size="11" text-anchor="middle">Calculates Chunk Matrix</text>

  <!-- S3 Managed Bucket with Part Storage -->
  <rect x="610" y="130" width="210" height="180" rx="6" fill="#2d3748" stroke="#ed8936" stroke-width="2"/>
  <text x="715" y="155" fill="#e2e8f0" font-family="Segoe UI, sans-serif" font-size="14" font-weight="bold" text-anchor="middle">Cloud Storage (S3)</text>
  
  <!-- Staging Area Visual -->
  <rect x="625" y="175" width="180" height="85" rx="4" fill="#1a202c" stroke="#4a5568" stroke-width="1"/>
  <text x="715" y="193" fill="#a0aec0" font-family="Segoe UI, sans-serif" font-size="11" text-anchor="middle" font-weight="bold">Staging Cache (UploadId)</text>
  
  <rect x="640" y="210" width="40" height="25" rx="2" fill="#2c5282"/>
  <text x="660" y="226" fill="#fff" font-family="Segoe UI, sans-serif" font-size="9" text-anchor="middle">Chunk 1</text>
  
  <rect x="695" y="210" width="40" height="25" rx="2" fill="#2c5282"/>
  <text x="715" y="226" fill="#fff" font-family="Segoe UI, sans-serif" font-size="9" text-anchor="middle">Chunk 2</text>

  <rect x="750" y="210" width="40" height="25" rx="2" fill="#2d3748" stroke="#4a5568" stroke-dasharray="2"/>
  <text x="770" y="226" fill="#718096" font-family="Segoe UI, sans-serif" font-size="9" text-anchor="middle">Pending</text>

  <text x="715" y="285" fill="#ed8936" font-family="Segoe UI, sans-serif" font-size="11" text-anchor="middle" font-weight="bold">Stitches to File on Complete()</text>

  <!-- Connectors -->
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#718096" />
    </marker>
  </defs>

  <!-- Step 1 & 2 Workflow Lines -->
  <path d="M 125 130 L 125 70 L 350 70" fill="none" stroke="#718096" stroke-width="1.5" marker-end="url(#arr)" />
  <text x="225" y="60" fill="#cbd5e0" font-family="Segoe UI, sans-serif" font-size="11">1. Init (Size + Chunks)</text>

  <path d="M 530 55 L 715 55 L 715 130" fill="none" stroke="#48bb78" stroke-width="1.5" marker-end="url(#arr)" />
  <text x="625" y="45" fill="#48bb78" font-family="Segoe UI, sans-serif" font-size="11" text-anchor="middle">2. CreateMultipartUpload()</text>

  <!-- Step 3 Return Array of URLs -->
  <path d="M 350 90 L 165 90 L 165 130" fill="none" stroke="#48bb78" stroke-width="1.5" marker-end="url(#arr)" />
  <text x="240" y="105" fill="#48bb78" font-family="Segoe UI, sans-serif" font-size="11" text-anchor="middle">3. Array of Presigned URLs</text>

  <!-- Step 4 Parallel Upload Streams -->
  <path d="M 220 215 L 610 215" fill="none" stroke="#ed8936" stroke-width="2" marker-end="url(#arr)" />
  <path d="M 220 227 L 610 227" fill="none" stroke="#ed8936" stroke-width="2" marker-end="url(#arr)" />
  <text x="415" y="247" fill="#ed8936" font-family="Segoe UI, sans-serif" font-size="12" font-weight="bold" text-anchor="middle">4. Concurrent Chunk Uploads + ETag Tracking</text>

  <!-- Step 5 Complete Call -->
  <path d="M 125 310 L 125 375 L 440 375 L 440 115" fill="none" stroke="#3182ce" stroke-width="1.5" stroke-dasharray="3" marker-end="url(#arr)" />
  <text x="270" y="365" fill="#63b3ed" font-family="Segoe UI, sans-serif" font-size="11">5. Finalize with ETag Manifest</text>

  <!-- Step 6 Final Hook Assemble -->
  <path d="M 470 115 L 470 355 L 715 355 L 715 310" fill="none" stroke="#48bb78" stroke-width="1.5" marker-end="url(#arr)" />
  <text x="590" y="345" fill="#48bb78" font-family="Segoe UI, sans-serif" font-size="11" text-anchor="middle">6. CompleteMultipartUpload()</text>
</svg>
